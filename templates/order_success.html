{% extends "base.html" %}
{% block title %}Order Successful | Royal Restaurant{% endblock %}
{% block content %}
<section class="py-5">
    <div class="container">
        <div class="success-panel text-center mx-auto">
            <div class="success-icon">
                <i class="bi bi-check2-circle"></i>
            </div>
            <span class="eyebrow text-warning">Order Confirmed</span>
            <h1 class="fw-bold mt-3">Thanks, {{ customer_name }}!</h1>
            <p class="text-secondary lead">Your order has been sent to the kitchen. Please relax while your food is being prepared.</p>
            <div class="d-flex flex-wrap justify-content-center gap-3 mt-4">
                <a href="{{ url_for('home') }}" class="btn btn-warning rounded-pill px-4">
                    <i class="bi bi-house-door me-2"></i>Back to Home
                </a>
                <a href="{{ url_for('cart') }}" class="btn btn-outline-light rounded-pill px-4">
                    <i class="bi bi-basket me-2"></i>Start New Order
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
